<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Urbanist:wght@700;800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0F0F0F"/>

  <!-- Hook -->
  <text x="90" y="280" font-family="Urbanist, sans-serif" font-weight="800" font-size="96" fill="#FFFFFF" letter-spacing="-3">Stop investing on</text>
  <text x="90" y="385" font-family="Urbanist, sans-serif" font-weight="800" font-size="96" fill="#FFFFFF" letter-spacing="-3">influencer takes.</text>

  <!-- Accent line -->
  <rect x="90" y="445" width="80" height="3" fill="#3B82F6"/>

  <!-- Body opening line -->
  <text x="90" y="525" font-family="Inter, sans-serif" font-weight="500" font-size="26" fill="#FFFFFF">Built by an investor tired of crypto Twitter noise.</text>

  <!-- Body main -->
  <text x="90" y="605" font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="#A1A1AA">Multi-factor risk scoring. Macro regime detection.</text>
  <text x="90" y="640" font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="#A1A1AA">AI-generated briefings. For retail investors who</text>
  <text x="90" y="675" font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="#A1A1AA">want signal, not screaming.</text>

  <!-- Tagline -->
  <text x="90" y="765" font-family="Inter, sans-serif" font-weight="500" font-size="26" fill="#FFFFFF">Arkline. Invest with conviction.</text>

  <!-- CTA Button -->
  <rect x="90" y="845" width="340" height="68" rx="10" fill="#3B82F6"/>
  <text x="120" y="889" font-family="Inter, sans-serif" font-weight="600" font-size="22" fill="#FFFFFF">Reserve early access →</text>

  <!-- Bottom logo strip -->
  <polygon points="90,1003 110,975 130,1003 122,1003 110,985 98,1003" fill="#3B82F6"/>
  <text x="140" y="1003" font-family="Urbanist, sans-serif" font-weight="700" font-size="26" fill="#FFFFFF" letter-spacing="-0.5">Arkline</text>
  <text x="990" y="1003" font-family="Inter, sans-serif" font-weight="400" font-size="22" fill="#A1A1AA" text-anchor="end">arkline.io</text>
</svg>

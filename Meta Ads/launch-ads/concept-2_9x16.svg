<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Urbanist:wght@700;800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#0F0F0F"/>

  <!-- Hook -->
  <text x="90" y="560" font-family="Urbanist, sans-serif" font-weight="800" font-size="116" fill="#FFFFFF" letter-spacing="-3">Stop investing on</text>
  <text x="90" y="690" font-family="Urbanist, sans-serif" font-weight="800" font-size="116" fill="#FFFFFF" letter-spacing="-3">influencer takes.</text>

  <!-- Accent line -->
  <rect x="90" y="760" width="100" height="3" fill="#3B82F6"/>

  <!-- Body opening line -->
  <text x="90" y="880" font-family="Inter, sans-serif" font-weight="500" font-size="32" fill="#FFFFFF">Built by an investor tired of crypto Twitter noise.</text>

  <!-- Body main -->
  <text x="90" y="990" font-family="Inter, sans-serif" font-weight="400" font-size="28" fill="#A1A1AA">Multi-factor risk scoring. Macro regime detection.</text>
  <text x="90" y="1035" font-family="Inter, sans-serif" font-weight="400" font-size="28" fill="#A1A1AA">AI-generated briefings. For retail investors who</text>
  <text x="90" y="1080" font-family="Inter, sans-serif" font-weight="400" font-size="28" fill="#A1A1AA">want signal, not screaming.</text>

  <!-- Tagline -->
  <text x="90" y="1200" font-family="Inter, sans-serif" font-weight="500" font-size="32" fill="#FFFFFF">Arkline. Invest with conviction.</text>

  <!-- CTA Button -->
  <rect x="90" y="1300" width="400" height="80" rx="10" fill="#3B82F6"/>
  <text x="126" y="1352" font-family="Inter, sans-serif" font-weight="600" font-size="26" fill="#FFFFFF">Reserve early access →</text>

  <!-- Bottom logo strip -->
  <polygon points="90,1820 116,1785 142,1820 132,1820 116,1800 100,1820" fill="#3B82F6"/>
  <text x="156" y="1820" font-family="Urbanist, sans-serif" font-weight="700" font-size="32" fill="#FFFFFF" letter-spacing="-0.5">Arkline</text>
  <text x="990" y="1820" font-family="Inter, sans-serif" font-weight="400" font-size="26" fill="#A1A1AA" text-anchor="end">arkline.io</text>
</svg>

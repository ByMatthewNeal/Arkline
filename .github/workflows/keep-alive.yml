name: Keep Supabase Alive

on:
  schedule:
    # Runs every 4 days at 12:00 UTC (well within 7-day pause window)
    - cron: '0 12 */4 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://mprbbjgrshfbupheuscn.supabase.co/rest/v1/?apikey=${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Project is alive"
          else
            echo "WARNING: Unexpected status $STATUS"
            exit 1
          fi
